<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách người dùng | Lập trình Web @01/2024</title>
    <link rel="stylesheet" href="public/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">WebDev Lab</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Đăng nhập</a></li>
                <li><a href="register.html">Đăng ký</a></li>
                <li><a href="list.html" class="active">Quản lý</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="glass" style="padding: 2rem; margin-top: 1rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <h2 style="font-size: 1.5rem; font-weight: 600;">Danh sách người dùng</h2>
                <a href="register.html" class="btn btn-primary" style="width: auto;"><i class="fas fa-user-plus"></i> Thêm mới</a>
            </div>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th># ID</th>
                            <th>Username</th>
                            <th>Email</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        <!-- Dữ liệu sẽ được load ở đây thông qua API -->
                        <tr><td colspan="4" style="text-align: center;">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>

            <script>
                document.addEventListener("DOMContentLoaded", async () => {
                    try {
                        const response = await fetch('/api/users');
                        if (!response.ok) throw new Error('API Error');
                        
                        const users = await response.json();
                        const tbody = document.getElementById('user-table-body');
                        
                        if(users.length === 0) {
                            tbody.innerHTML = '<tr><td colspan="4" style="text-align: center;">Không có dữ liệu</td></tr>';
                            return;
                        }

                        tbody.innerHTML = users.map(user => `
                            <tr>
                                <td>${user.user_id}</td>
                                <td>${user.user_name}</td>
                                <td>${user.user_email}</td>
                                <td class="action-links">
                                    <a href="update.html" class="icon-btn edit" title="Chỉnh sửa"><i class="fas fa-edit"></i></a>
                                    <a href="view.html" class="icon-btn view" title="Xem chi tiết"><i class="fas fa-eye"></i></a>
                                    <a href="#" class="icon-btn delete" title="Xóa"><i class="fas fa-trash"></i></a>
                                </td>
                            </tr>
                        `).join('');

                    } catch (error) {
                        console.error('Lỗi khi lấy dữ liệu người dùng:', error);
                        document.getElementById('user-table-body').innerHTML = '<tr><td colspan="4" style="text-align: center; color: red;">Lỗi tải dữ liệu, hãy đảm bảo Database và Server Node.js đang chạy</td></tr>';
                    }
                });
            </script>

            <nav>
                <ul class="pagination">
                    <li><a href="#">Previous</a></li>
                    <li><a href="#" class="active">1</a></li>
                    <li><a href="#">2</a></li>
                    <li><a href="#">3</a></li>
                    <li><a href="#">Next</a></li>
                </ul>
            </nav>
        </div>
    </main>

    <footer>
        <p>Lập trình web @01/2024</p>
    </footer>
</body>
</html>
