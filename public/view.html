<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết người dùng | Lập trình Web @01/2024</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .profile-header {
            text-align: center;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 2rem;
        }
        
        .profile-avatar {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--accent-light), #58a6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 1.5rem;
            box-shadow: 0 10px 40px rgba(35, 134, 54, 0.4);
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .profile-name {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }
        
        .profile-role {
            display: inline-block;
            padding: 0.4rem 1rem;
            background: linear-gradient(135deg, var(--accent-color), var(--accent-light));
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .profile-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .info-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: var(--transition);
        }
        
        .info-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--accent-light);
            transform: translateY(-5px);
        }
        
        .info-card .info-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .info-card .info-label i {
            color: var(--accent-light);
        }
        
        .info-card .info-value {
            font-size: 1.1rem;
            color: var(--text-primary);
            font-weight: 500;
            word-break: break-word;
        }
        
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn-action {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.875rem 2rem;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 10px;
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        
        .btn-edit {
            background: linear-gradient(135deg, var(--link-color), #4090ff);
            color: #fff;
            border: none;
        }
        
        .btn-edit:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(88, 166, 255, 0.4);
        }
        
        .btn-back {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-primary);
        }
        
        .btn-delete {
            background: linear-gradient(135deg, var(--danger-color), #da3633);
            color: #fff;
            border: none;
        }
        
        .btn-delete:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(248, 81, 73, 0.4);
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
        }
        
        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-light);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <i class="fas fa-code"></i> WebDev Lab
            </div>
            <ul class="nav-links">
                <li><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="login.html"><i class="fas fa-sign-in-alt"></i> Đăng nhập</a></li>
                <li><a href="register.html"><i class="fas fa-user-plus"></i> Đăng ký</a></li>
                <li><a href="list.html"><i class="fas fa-users"></i> Quản lý</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="profile-card glass reveal">
            <div class="profile-header">
                <div class="profile-avatar" id="avatarInitial">U</div>
                <h1 class="profile-name" id="profileName">user_name</h1>
                <span class="profile-role" id="profileRole">Administrator</span>
            </div>
            
            <div class="profile-grid">
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-fingerprint"></i>
                        User ID
                    </div>
                    <div class="info-value" id="userId">#1</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-user"></i>
                        Username
                    </div>
                    <div class="info-value" id="userName">username</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-envelope"></i>
                        Email
                    </div>
                    <div class="info-value" id="userEmail">email@example.com</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-calendar-alt"></i>
                        Ngày tạo
                    </div>
                    <div class="info-value" id="createdAt">01/01/2024</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-clock"></i>
                        Cập nhật lần cuối
                    </div>
                    <div class="info-value" id="updatedAt">01/01/2024</div>
                </div>
                
                <div class="info-card">
                    <div class="info-label">
                        <i class="fas fa-shield-alt"></i>
                        Trạng thái
                    </div>
                    <div class="info-value">
                        <span style="color: var(--accent-color);">
                            <i class="fas fa-check-circle"></i> Active
                        </span>
                    </div>
                </div>
            </div>
            
            <div class="stats-row">
                <div class="stat-item">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Đơn hàng</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Sản phẩm</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">0</div>
                    <div class="stat-label">Đánh giá</div>
                </div>
            </div>
            
            <div class="action-buttons" style="margin-top: 2rem;">
                <a href="update.html" class="btn-action btn-edit">
                    <i class="fas fa-edit"></i> Chỉnh sửa
                </a>
                <a href="list.html" class="btn-action btn-back">
                    <i class="fas fa-arrow-left"></i> Quay lại
                </a>
                <button class="btn-action btn-delete" onclick="confirmDelete()">
                    <i class="fas fa-trash"></i> Xóa
                </button>
            </div>
        </div>
    </main>

    <footer>
        <p><i class="fas fa-code"></i> Lập trình web @01/2024</p>
    </footer>
    
    <script>
        // Lấy thông tin user từ URL params hoặc localStorage
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const userId = urlParams.get('id');
            
            // Nếu có ID, tải dữ liệu từ API
            if (userId) {
                loadUserData(userId);
            } else {
                // Hiển thị dữ liệu mẫu nếu không có ID
                const sampleData = {
                    user_id: 1,
                    user_name: 'alpha',
                    user_email: 'alpha@gmail.com',
                    created_at: '2024-01-01 00:00:00',
                    updated_at: '2024-01-01 00:00:00'
                };
                displayUserData(sampleData);
            }
        });
        
        async function loadUserData(userId) {
            try {
                const response = await fetch('/api/users');
                if (!response.ok) throw new Error('Không thể tải dữ liệu');
                const users = await response.json();
                const user = users.find(u => u.user_id == userId);
                
                if (user) {
                    displayUserData(user);
                } else {
                    showError('Không tìm thấy người dùng');
                }
            } catch (error) {
                console.error('Lỗi:', error);
                showError('Lỗi khi tải dữ liệu người dùng');
            }
        }
        
        function displayUserData(user) {
            document.getElementById('userId').textContent = '#' + user.user_id;
            document.getElementById('userName').textContent = user.user_name;
            document.getElementById('userEmail').textContent = user.user_email;
            document.getElementById('profileName').textContent = user.user_name;
            document.getElementById('avatarInitial').textContent = user.user_name.charAt(0).toUpperCase();
            
            if (user.created_at) {
                const date = new Date(user.created_at);
                document.getElementById('createdAt').textContent = date.toLocaleDateString('vi-VN');
            }
            
            if (user.updated_at) {
                const date = new Date(user.updated_at);
                document.getElementById('updatedAt').textContent = date.toLocaleDateString('vi-VN');
            }
        }
        
        function showError(message) {
            document.querySelector('.profile-card').innerHTML = `
                <div style="text-align: center; padding: 3rem;">
                    <i class="fas fa-exclamation-circle" style="font-size: 3rem; color: var(--danger-color); margin-bottom: 1rem;"></i>
                    <p style="color: var(--text-secondary);">${message}</p>
                    <a href="list.html" class="btn-action btn-back" style="margin-top: 1rem; display: inline-block;">
                        <i class="fas fa-arrow-left"></i> Quay lại danh sách
                    </a>
                </div>
            `;
        }
        
        function confirmDelete() {
            if (confirm('Bạn có chắc chắn muốn xóa người dùng này?')) {
                alert('Chức năng xóa sẽ được cập nhật!');
                // TODO: Implement delete functionality
            }
        }
    </script>
</body>
</html>
