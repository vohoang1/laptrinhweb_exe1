<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký | Lập trình Web @01/2024</title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">WebDev Lab</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Đăng nhập</a></li>
                <li><a href="register.html" class="active">Đăng ký</a></li>
                <li><a href="list.html">Quản lý</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container glass" style="max-width: 500px;">
            <h2 class="form-title">Tạo tài khoản mới</h2>
            <form action="login.html" method="GET">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" placeholder="Nhập tên đăng nhập" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" class="form-control" placeholder="Nhập mật khẩu" required>
                </div>
                <div class="form-group">
                    <label for="confirm-password">Nhập lại mật khẩu</label>
                    <input type="password" id="confirm-password" class="form-control" placeholder="Xác nhận mật khẩu" required>
                </div>
                <button type="submit" class="btn btn-primary">Đăng ký</button>
                
                <div class="form-footer">
                    Bạn đã có tài khoản? <a href="login.html">Đăng nhập</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>Lập trình web @01/2024</p>
    </footer>
</body>
</html>
