<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cập nhật thông tin | Lập trình Web @01/2024</title>
    <link rel="stylesheet" href="CSS/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">WebDev Lab</div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html">Đăng nhập</a></li>
                <li><a href="register.html">Đăng ký</a></li>
                <li><a href="list.html">Quản lý</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="form-container glass" style="max-width: 500px;">
            <h2 class="form-title">Chỉnh sửa thông tin</h2>
            <form action="list.html" method="GET">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" class="form-control" value="test1" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" class="form-control" value="test1@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu mới (để trống nếu không đổi)</label>
                    <input type="password" id="password" class="form-control" placeholder=" Nhập mật khẩu mới">
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-save"></i> Lưu thay đổi</button>
                
                <div class="form-footer">
                    <a href="list.html">Hủy và quay lại</a>
                </div>
            </form>
        </div>
    </main>

    <footer>
        <p>Lập trình web @01/2024</p>
    </footer>
</body>
</html>
